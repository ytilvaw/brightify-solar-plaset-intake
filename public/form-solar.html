<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Solar Planset Request</title>
</head>
<body>
  <!-- Static skeleton for Netlify build-time form detection. Never shown to users. -->
  <form
    name="solar-planset-request"
    method="POST"
    enctype="multipart/form-data"
    data-netlify="true"
    netlify-honeypot="bot-field"
    hidden
  >
    <input type="hidden" name="form-name" value="solar-planset-request" />
    <input type="text" name="siteAddress" />
    <input type="text" name="mainPanelRating" />
    <select name="roofType"><option></option></select>
    <input type="file" name="mainPanelPhoto" />
    <input type="file" name="frontHousePhoto" />
    <input type="file" name="sidewallPhoto" />
    <input type="file" name="roofPhoto" />
    <input type="file" name="meterPhoto" />
    <input type="file" name="additionalPhoto" />
    <input type="text" name="solarPanel" />
    <input type="text" name="inverter" />
    <input type="text" name="battery" />
    <input name="bot-field" />
  </form>
</body>
</html>
