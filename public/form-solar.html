<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Solar Installation Survey</title>
</head>
<body>
  <!-- Static skeleton for Netlify build-time form detection. Never shown to users. -->
  <form
    name="solar-installation-survey"
    method="POST"
    enctype="multipart/form-data"
    data-netlify="true"
    netlify-honeypot="bot-field"
    hidden
  >
    <input type="hidden" name="form-name" value="solar-installation-survey" />
    <input type="text" name="siteAddress" />
    <input type="text" name="mainPanelRating" />
    <input type="file" name="mainPanelPhoto" />
    <input type="file" name="frontHousePhoto" />
    <input type="file" name="sidewallPhoto" />
    <input type="text" name="solarPanel" />
    <input type="text" name="desiredSystemSize" />
    <input type="text" name="inverter" />
    <input type="text" name="battery" />
    <input name="bot-field" />
  </form>
</body>
</html>
