<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Form</title>
</head>
<body>
  <form name="favorite-season-survey" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="favorite-season-survey" />
    <input type="text" name="name" />
    <select name="season"></select>
    <textarea name="reason"></textarea>
    <input name="bot-field" />
  </form>
</body>
</html>
